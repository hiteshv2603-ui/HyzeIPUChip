[package]
name = "hyze-ipu-host"
version = "0.1.0"
edition = "2021"

[dependencies]
# BUG FIX: usb1 does not exist on crates.io; correct crate is rusb
rusb = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json"] }
zeroize = "1"
# BUG FIX: onnx = "0.2" does not exist; use tract-onnx
tract-onnx = "0.21"
worker = { version = "0.4", optional = true }

[features]
default = []
serverless = ["worker"]

[build-dependencies]
vergen = "8"
